name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Ein laufendes Deployment nicht abbrechen, aber wartende zusammenfassen.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # build.mjs kommt ohne Abhängigkeiten aus, daher kein npm install.
      - run: node build.mjs

      # Pflicht-Rauchtest: sichert die Invarianten des entfernten patch()-Wächters
      # ab (ebenfalls abhängigkeitsfrei, kein npm install).
      - run: node tools/smoke-build.mjs
      # Verhaltenstests der Flavor-Laufzeit (ebenfalls abhängigkeitsfrei).
      - run: node tools/tests/flavor-runtime.test.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
